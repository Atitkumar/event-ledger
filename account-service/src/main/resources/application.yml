spring:
  application:
    name: account-service

  datasource:
    url: jdbc:h2:mem:accountdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
    health:
      show-details: always

logging:
  pattern:
    console: >
      %d{yyyy-MM-dd HH:mm:ss}
      %-5level
      [%X{traceId}]
      %logger{36}
      - %msg%n

